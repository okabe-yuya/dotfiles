# ============================================
# モニター定義
# ============================================
# cursor_x / cursor_y: サブモニターにフォーカスを移すための座標
# 確認方法: cliclick p で現在のマウス座標を表示できる
# メインモニターは null（デフォルトでフォーカスがある）
monitors:
  main:
    description: "MacBook内蔵ディスプレイ"
    cursor_x: null
    cursor_y: null
  sub:
    description: "外部ディスプレイ"
    cursor_x: 2600
    cursor_y: 400

# ============================================
# テンプレート定義
# ============================================
templates:
  dev:
    description: "開発用ワークスペース"
    monitors:
      main:
        desktops:
          - apps: ["Obsidian"]
          - apps: ["Google Chrome"]
      sub:
        desktops:
          - apps: ["Ghostty"]
          - apps: ["IntelliJ IDEA"]
