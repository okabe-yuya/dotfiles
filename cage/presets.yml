presets:
  base:
    allow:
      - "." # current
      - "$HOME/workspace"
      - "$HOME/dotfiles"
      - "$HOME/.cache"
      - "$HOME/.local/share"
      - "$HOME/.local/state"
      - "$HOME/Library/Caches" # macos app caches
      - "$HOME/Library/Application Support/kotlin"
      - "$HOME/.gradle"
      - "/private/tmp" # macos tmp directory
      - "/var/folders" # macos mktemp

  git-enabled:
    allow-git: true
    allow-keychain: true # macOS only

  claude-code:
    allow:
      - "$HOME/.claude"
      - "$HOME/.claude.json"
      - "$HOME/.claude.json.backup"
      - "$HOME/.config/claude"
      - "$HOME/tmp"
      - "/tmp"

auto-presets:
  - command: claude
    presets:
      - base
      - git-enabled
      - claude-code

